<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#5b21b6"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- fundo -->
  <rect x="64" y="64" width="896" height="896" rx="200" fill="url(#bg)"/>
  <rect x="64" y="64" width="896" height="512" rx="200" fill="url(#sheen)"/>

  <!-- tela sendo gravada (painel) -->
  <rect x="200" y="264" width="624" height="440" rx="40" fill="#ffffff" opacity="0.96"/>

  <!-- anotação ao vivo: o traço à mão livre é o PILAR do app -->
  <path d="M280 600 Q380 470 470 560 T680 470"
        fill="none" stroke="#8b5cf6" stroke-width="34" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- indicador de gravação (REC) no canto da tela -->
  <circle cx="712" cy="356" r="52" fill="#ef4444"/>
  <circle cx="712" cy="356" r="52" fill="none" stroke="#ffffff" stroke-width="10" opacity="0.85"/>

  <!-- base do monitor -->
  <rect x="452" y="704" width="120" height="52" fill="#ffffff" opacity="0.9"/>
  <rect x="372" y="748" width="280" height="34" rx="17" fill="#ffffff" opacity="0.9"/>

  <!-- assinatura da marca -->
  <text x="512" y="908" font-family="Segoe Script, cursive" font-size="80"
        fill="#ffffff" opacity="0.55" text-anchor="middle">Taylor</text>
</svg>
